[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true

# RPC for fork tests (MasterEquationT1Fork). Any working Base RPC URL with
# archive support is sufficient; the public endpoint https://mainnet.base.org
# works. Set RPC_BASE_ALCHEMY in your shell.
[rpc_endpoints]
base = "${RPC_BASE_ALCHEMY}"
